<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews - The Serene Finder</title>
    <link rel="stylesheet" href="styles/pages/my_reviews.css">
</head>
<body class="dashboard-body">

    <aside class="dashboard-sidebar">
        <a href="index.html" class="sidebar-brand" style="cursor: pointer; text-decoration: none; color: inherit;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#2c636b"><path d="M12 2L2 22h20L12 2z"/></svg>
            The Serene Finder
        </a>

        <ul class="dashboard-nav" id="sidebarNav">
            <li><a href="dashboard.html" style="display: block; text-decoration: none; color: inherit;"><span>👤</span> Profile</a></li>
            
            <li><a href="archive.html" style="display: block; text-decoration: none; color: inherit;"><span>📅</span> Bookings</a></li>
            
            <li class="active"><a href="my_reviews.html" style="display: block; text-decoration: none; color: inherit;"><span>⭐</span> Reviews</a></li>
            <li><a href="settings.html" style="display: block; text-decoration: none; color: inherit;"><span>⚙️</span> Settings</a></li>
        </ul>

        <div class="logout-btn" id="reviewsLogoutBtn">
            <span>🚪</span> Log out
        </div>
    </aside>

    <main class="dashboard-main">
        <div class="dash-header">
            <h1 id="review-page-title">My Reviews</h1>
            <p style="color: #8b9598;">Your feedback history on The Serene Finder.</p>
        </div>

        <div id="reviewsGrid" style="max-width: 800px; margin-top: 30px;">
            </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const logoutBtn = document.getElementById('reviewsLogoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    await fetch('api/logout.php');
                    window.location.href = 'index.html';
                });
            }

            try {
                const response = await fetch('api/get_my_reviews.php');
                const data = await response.json();

                if (!data.loggedIn) {
                    window.location.href = 'login.html';
                    return;
                }

                const grid = document.getElementById('reviewsGrid');
                
                document.getElementById('review-page-title').innerText = data.role === 'provider' ? 'Reviews Received' : 'Reviews Given';

                if (data.reviews && data.reviews.length > 0) {
                    let html = '';
                    data.reviews.forEach(review => {
                        const dateString = new Date(review.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                        const label = data.role === 'provider' ? `From Customer: ${review.other_name}` : `For Professional: ${review.other_name}`;
                        const timeDisplay = review.estimated_time ? `${review.estimated_time} Hours` : '--';
                        const priceDisplay = review.total_price ? `$${parseFloat(review.total_price).toFixed(2)}` : '--';

                        html += `
                        <div class="review-item">
                            <div class="review-item-head">
                                <div class="review-label">${label}</div>
                                <div class="review-date">${dateString}</div>
                            </div>
                            <div class="review-stars">${stars}</div>
                            <div class="review-meta">
                                <div><span>Work Duration:</span> <strong>${timeDisplay}</strong></div>
                                <div><span>Amount:</span> <strong>${priceDisplay}</strong></div>
                            </div>
                            <p class="review-comment">"${review.comment}"</p>
                        </div>
                        `;
                    });
                    grid.innerHTML = html;
                } else {
                    grid.innerHTML = `<p style="color: #8b9598;">No reviews found.</p>`;
                }

            } catch (error) {
                console.error("Failed to load reviews", error);
            }
        });
    </script>
</body>
</html>
