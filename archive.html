<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Archive - The Serene Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

    <aside class="dashboard-sidebar">
        <a href="index.html" class="sidebar-brand" style="cursor: pointer; text-decoration: none; color: inherit;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#2c636b"><path d="M12 2L2 22h20L12 2z"/></svg>
            The Serene Finder
        </a>

        <ul class="dashboard-nav" id="sidebarNav">
            <li><a href="dashboard.html" style="display: block; text-decoration: none; color: inherit;"><span>👤</span> Profile</a></li>
            
            <li class="active"><a href="archive.html" style="display: block; text-decoration: none; color: inherit;"><span>📅</span> Bookings</a></li>
            
            <li><a href="my_reviews.html" style="display: block; text-decoration: none; color: inherit;"><span>⭐</span> Reviews</a></li>
            <li><a href="settings.html" style="display: block; text-decoration: none; color: inherit;"><span>⚙️</span> Settings</a></li>
        </ul>

        <div class="logout-btn" id="archiveLogoutBtn">
            <span>🚪</span> Log out
        </div>
    </aside>

    <main class="dashboard-main">
        <div class="dash-header">
            <h1>Booking Archive</h1>
            <p style="color: #8b9598;">Your complete history of service requests and job offers.</p>
        </div>

        <div class="bookings-grid" id="archiveGrid" style="margin-top: 30px;">
            </div>
    </main>

    <script>
        // Ensures archive reflects latest booking states after browser back navigation.
        window.addEventListener("pageshow", function (event) {
            if (event.persisted) {
                window.location.reload();
            }
        });

        document.addEventListener("DOMContentLoaded", async () => {
            const logoutBtn = document.getElementById('archiveLogoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', async () => {
                    await fetch('api/logout.php');
                    window.location.href = 'index.html';
                });
            }

            try {
                const response = await fetch('api/get_dashboard_data.php');
                const data = await response.json();

                if (!data.loggedIn) {
                    window.location.href = 'login.html';
                    return;
                }

                const grid = document.getElementById('archiveGrid');
                let allHistory = [];
                // Merge both booking directions into one historical timeline.
                if (data.my_bookings) {
                    data.my_bookings.forEach(b => {
                        b.type = "Purchased Service";
                        b.icon = "🔧";
                        b.color = "#eef2f3";
                        allHistory.push(b);
                    });
                }
                if (data.job_offers) {
                    data.job_offers.forEach(b => {
                        b.type = "Job Offer";
                        b.icon = "📋";
                        b.color = "#ffebee";
                        allHistory.push(b);
                    });
                }
                allHistory.sort((a, b) => new Date(b.scheduled_date) - new Date(a.scheduled_date));

                if (allHistory.length === 0) {
                    grid.innerHTML = `<p style="color: #8b9598;">No booking history found.</p>`;
                    return;
                }
                let html = '';
                allHistory.forEach(booking => {
                    let statusClass = booking.status === 'confirmed' ? 'status-confirmed' : (booking.status === 'cancelled' ? 'status-cancelled' : 'status-pending');
                    const dateString = new Date(booking.scheduled_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    const timeDisplay = booking.estimated_time ? `${booking.estimated_time} Hours` : '--';
                    const priceDisplay = booking.total_price ? `$${parseFloat(booking.total_price).toFixed(2)}` : '--';

                    html += `
                        <div class="booking-item" style="opacity: ${booking.status === 'cancelled' ? '0.6' : '1'};">
                            <div class="booking-item-header">
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div style="width: 40px; height: 40px; border-radius: 8px; background: ${booking.color}; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">${booking.icon}</div>
                                    <span style="font-size: 0.8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase;">${booking.type}</span>
                                </div>
                                <span class="b-status ${statusClass}">${booking.status.toUpperCase()}</span>
                            </div>
                            <h4 style="margin-top: 15px;">${booking.issue_description || 'General Service'}</h4>
                            <p>Date: ${dateString}</p>
                            <div style="display: flex; gap: 20px; font-size: 0.85rem; margin: 10px 0; padding: 10px; background: #f5f7f8; border-radius: 6px;">
                                <div><span style="color: #666;">Duration:</span> <strong>${timeDisplay}</strong></div>
                                <div><span style="color: #666;">Amount:</span> <strong style="color: var(--primary-teal);">${priceDisplay}</strong></div>
                            </div>
                            ${booking.address ? `<div style="font-size: 0.8rem; color: #666; margin-bottom: 15px;">📍 ${booking.address}</div>` : ''}
                            <div class="booking-pro" style="margin-top: 15px;">
                                <div style="width: 24px; height: 24px; border-radius: 50%; background: #2c636b; color: white; display: flex; align-items: center; justify-content: center; font-size: 0.6rem;">ID</div>
                                <span>with ${booking.other_party}</span>
                            </div>
                        </div>
                    `;
                });

                grid.innerHTML = html;

            } catch (error) {
                console.error("Failed to load archive data", error);
                document.getElementById('archiveGrid').innerHTML = `<p style="color: red;">Error loading history.</p>`;
            }
        });
    </script>
</body>
</html>
